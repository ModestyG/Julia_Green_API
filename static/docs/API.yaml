openapi: "3.0.3"
info:
  title: People
  version: "1.0"
servers:
  - url: http://localhost:5000
paths:
  /users:
    get:
      summary: Get all users
      description: Retrieve a list of all users with optional filtering by name, age, or ID
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Filter users by name
        - in: query
          name: age
          schema:
            type: integer
          description: Filter users by age
        - in: query
          name: id
          schema:
            type: integer
          description: Filter users by ID
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    age:
                      type: integer
                  example:
                    id: 1
                    name: Alice
                    age: 30
        "400":
          description: Bad Request - Invalid query parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: "Invalid age parameter"
  /users/{id}:
    get:
      summary: Get user by ID
      description: Retrieve a single user by their unique ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The unique ID of the user
      responses:
        "200":
          description: A single user object
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  age:
                    type: integer
                example:
                  id: 1
                  name: Alice
                  age: 30
        "404":
          description: Not Found - User does not exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: "User not found"
